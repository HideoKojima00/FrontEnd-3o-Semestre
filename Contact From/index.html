<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
    <link rel="stylesheet" href="./css/style.css">

</head>

<body>
    <header class="form-header">
        <div class="container container--flex">
            <img src="./images/mdi_drivers-license-outline.svg" alt="Ícone de formulário"
                class="form-header__image-perfil">
            <h1 class="form-header__title">Contact Form</h1>
            <p>Preencha o formulário abaixo para cadastrar um novo contato.</p>
        </div>
    </header>
    </main>

    <div class="container">
        <form class="form-contact" action="">
            <div class="form-contact__linha">
                <div class="form-contact__col-a">
                    <label class="form-contact__label" for="nome">Nome</label>
                </div>
                <div class="form-contact__col-b">
                    <input class="form-contact__input form-contact__input--metade" type="text" id="nome" name="nome" placeholder="Nome">
                    <input class="form-contact__input form-contact__input--metade" type="text" id="sobrenome" name="sobrenome" placeholder="Sobrenome">
                </div>
            </div>

    <div class="container">
        <form class="form-contact" action="">
            <div class="form-contact__linha">
                <div class="form-contact__col-a">
                    <label class="form-contact__label" for="nome">Email</label>
                </div>
                <div class="form-contact__col-b">
                    <input class="form-contact__input form-contact__input--metade001" type="text" id="email" name="email" placeholder="Email">
                    <!-- <input class="form-contact__input form-contact__input--metade" type="text" id="senha" name="senha" placeholder="Senha"> -->
                </div>
            </div>

        </form>
    </div>
    <main>
    </footer>
    todos os direitos reservados
    </footer>
</body>

</html>
